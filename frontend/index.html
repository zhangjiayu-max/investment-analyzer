<!doctype html>
<html lang="en" class="">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Prevent flash of wrong theme — default to dark
      try {
        const saved = localStorage.getItem('ia-theme')
        if (saved === 'false') {
          // User explicitly chose light mode
        } else {
          // Default dark (no preference or saved === 'true')
          document.documentElement.classList.add('dark')
        }
      } catch(e) {}
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>投资分析助手</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
