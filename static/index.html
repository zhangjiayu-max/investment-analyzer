<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投资分析管理</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
.img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.img-card { position: relative; border-radius: 8px; overflow: hidden; border: 1px solid #e5e7eb; }
.img-card img { width: 100%; height: 160px; object-fit: cover; }
.status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 500; }
.status-pending { background: #fef3c7; color: #92400e; }
.status-downloading { background: #dbeafe; color: #1e40af; }
.status-downloaded { background: #e0e7ff; color: #3730a3; }
.status-analyzed { background: #d1fae5; color: #065f46; }
.status-error { background: #fee2e2; color: #991b1b; }
.status-success { background: #d1fae5; color: #065f46; }
.record-status { position: absolute; top: 4px; right: 4px; padding: 2px 6px; border-radius: 6px; font-size: 11px; }
.loading { opacity: 0.5; pointer-events: none; }
tr.clickable { cursor: pointer; }
tr.clickable:hover { background: #f9fafb; }
tr.selected { background: #eff6ff; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 50; }
.modal-content { background: white; border-radius: 12px; max-width: 90vw; max-height: 90vh; overflow: auto; padding: 20px; }
</style>
</head>
<body class="bg-gray-50 text-gray-900">
<div class="max-w-7xl mx-auto px-4 py-6">
  <h1 class="text-2xl font-bold mb-4">投资分析管理</h1>

  <!-- Tabs -->
  <div class="flex gap-2 mb-6 border-b pb-2">
    <button class="tab-btn px-4 py-2 rounded-t font-medium text-blue-600 border-b-2 border-blue-600" data-tab="articles">文章管理</button>
    <button class="tab-btn px-4 py-2 rounded-t font-medium text-gray-500" data-tab="valuations">估值数据</button>
  </div>

  <!-- Tab: Articles -->
  <div id="tab-articles" class="tab-content">
    <div class="flex gap-2 mb-4 flex-wrap">
      <button onclick="syncArticles()" class="px-3 py-1.5 bg-blue-600 text-white rounded text-sm hover:bg-blue-700">同步文章</button>
      <button onclick="refreshArticles()" class="px-3 py-1.5 bg-gray-200 rounded text-sm hover:bg-gray-300">刷新列表</button>
      <select id="status-filter" onchange="refreshArticles()" class="px-3 py-1.5 border rounded text-sm">
        <option value="">全部状态</option>
        <option value="pending">待处理</option>
        <option value="downloaded">已下载</option>
        <option value="analyzed">已分析</option>
        <option value="error">异常</option>
      </select>
      <span id="article-count" class="text-sm text-gray-500 self-center"></span>
    </div>
    <div id="article-list" class="bg-white rounded-lg shadow overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-gray-100"><tr>
          <th class="p-2 text-left w-12">#</th>
          <th class="p-2 text-left">标题</th>
          <th class="p-2 text-left w-28">日期</th>
          <th class="p-2 text-left w-20">图片</th>
          <th class="p-2 text-left w-24">状态</th>
          <th class="p-2 text-left w-40">操作</th>
        </tr></thead>
        <tbody id="article-tbody"></tbody>
      </table>
    </div>

    <!-- Article Detail -->
    <div id="article-detail" class="mt-6 hidden">
      <div class="flex items-center gap-3 mb-4">
        <h2 id="detail-title" class="text-lg font-semibold"></h2>
        <span id="detail-status" class="status-badge"></span>
        <button onclick="hideDetail()" class="text-gray-400 hover:text-gray-600 text-sm">✕ 关闭</button>
      </div>
      <div class="flex gap-2 mb-4">
        <button id="btn-download" class="px-3 py-1.5 bg-indigo-600 text-white rounded text-sm hover:bg-indigo-700">下载图片</button>
        <button id="btn-analyze" class="px-3 py-1.5 bg-green-600 text-white rounded text-sm hover:bg-green-700">分析全部</button>
      </div>
      <div id="image-grid" class="img-grid"></div>
      <div id="analysis-result" class="mt-4"></div>
    </div>
  </div>

  <!-- Tab: Valuations -->
  <div id="tab-valuations" class="tab-content hidden">
    <div class="flex gap-2 mb-4">
      <button onclick="refreshValuations()" class="px-3 py-1.5 bg-gray-200 rounded text-sm hover:bg-gray-300">刷新</button>
      <input id="val-search" placeholder="搜索指数名称/代码..." class="px-3 py-1.5 border rounded text-sm flex-1 max-w-xs"
             oninput="filterValuations()">
    </div>
    <div id="valuation-list" class="bg-white rounded-lg shadow overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-gray-100"><tr>
          <th class="p-2 text-left">指数代码</th>
          <th class="p-2 text-left">指数名称</th>
          <th class="p-2 text-left">指标类型</th>
          <th class="p-2 text-right">最新值</th>
          <th class="p-2 text-right">分位点</th>
          <th class="p-2 text-left">最新日期</th>
          <th class="p-2 text-right">记录数</th>
        </tr></thead>
        <tbody id="valuation-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal" class="modal-overlay hidden" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="flex justify-between items-center mb-3">
      <h3 class="font-semibold text-lg" id="modal-title">分析结果</h3>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
    </div>
    <pre id="modal-body" class="bg-gray-50 p-4 rounded text-xs overflow-auto max-h-[60vh]"></pre>
  </div>
</div>

<script>
let currentArticleId = null;

// ── Tab Switching ──
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.remove('text-blue-600', 'border-b-2', 'border-blue-600');
      b.classList.add('text-gray-500');
    });
    btn.classList.add('text-blue-600', 'border-b-2', 'border-blue-600');
    btn.classList.remove('text-gray-500');
    document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
    document.getElementById('tab-' + btn.dataset.tab).classList.remove('hidden');
    if (btn.dataset.tab === 'valuations') refreshValuations();
  });
});

// ── Articles ──
function getStatusBadge(status) {
  const labels = {pending:'待处理', downloading:'下载中', downloaded:'已下载', analyzing:'分析中', analyzed:'已分析', error:'异常'};
  return `<span class="status-badge status-${status}">${labels[status] || status}</span>`;
}

async function syncArticles() {
  const btn = event.target; btn.disabled = true; btn.textContent = '同步中...';
  try {
    const r = await fetch('/api/articles/sync', {method:'POST'});
    const d = await r.json();
    alert(`同步完成，共 ${d.total} 篇文章`);
    refreshArticles();
  } catch(e) { alert('同步失败: ' + e.message); }
  finally { btn.disabled = false; btn.textContent = '同步文章'; }
}

async function refreshArticles() {
  const status = document.getElementById('status-filter').value;
  const url = '/api/articles' + (status ? '?status=' + status : '');
  const r = await fetch(url); const d = await r.json();
  const tbody = document.getElementById('article-tbody');
  document.getElementById('article-count').textContent = `共 ${d.articles.length} 篇`;
  tbody.innerHTML = d.articles.map(a => `
    <tr class="clickable ${currentArticleId === a.id ? 'selected' : ''}" onclick="showDetail(${a.id})">
      <td class="p-2 text-gray-400">${a.seq || '-'}</td>
      <td class="p-2">${esc(a.title || '无标题')}</td>
      <td class="p-2 text-gray-500">${(a.publish_time || '').slice(0,10)}</td>
      <td class="p-2">${a.image_count || 0}</td>
      <td class="p-2">${getStatusBadge(a.status)}</td>
      <td class="p-2">
        <button onclick="event.stopPropagation();showDetail(${a.id})" class="text-blue-600 hover:underline text-xs">详情</button>
      </td>
    </tr>
  `).join('');
  if (currentArticleId && d.articles.some(a => a.id === currentArticleId)) {
    showDetail(currentArticleId);
  }
}

async function showDetail(id) {
  currentArticleId = id;
  const r = await fetch(`/api/articles/${id}`); const a = await r.json();
  document.getElementById('detail-title').textContent = a.title || '无标题';
  document.getElementById('detail-status').className = 'status-badge status-' + a.status;
  document.getElementById('detail-status').textContent = a.status;
  document.getElementById('article-detail').classList.remove('hidden');
  document.getElementById('btn-download').onclick = () => downloadImages(id);
  document.getElementById('btn-analyze').onclick = () => analyzeAll(id);
  refreshArticles();

  // Image grid
  const grid = document.getElementById('image-grid');
  const records = a.analysis_records || [];
  if (records.length === 0) {
    grid.innerHTML = '<p class="text-gray-400 text-sm col-span-full">暂无图片，请先下载</p>';
    return;
  }
  grid.innerHTML = records.map(r => {
    const imgUrl = '/static/images/' + relPath(r.image_path);
    const statusLabels = {pending:'待分析', success:'成功', error:'失败'};
    const rawData = r.raw_response ? JSON.stringify(r.raw_response) : 'null';
    return `<div class="img-card">
      <img src="${imgUrl}" loading="lazy" onclick="showModal('图片预览','<img src=\\'${imgUrl}\\' class=\\'max-w-full\\'>')">
      <span class="record-status status-${r.status}">${statusLabels[r.status] || r.status}</span>
      <div class="p-2 text-xs">
        <div>${esc(r.index_code || '?')} ${esc(r.index_name || '')}</div>
        <div class="text-gray-400">${r.metric_type || ''} ${r.status === 'error' ? '⚠ ' + esc(r.error_msg || '') : ''}</div>
        <div class="flex gap-2 mt-1">
          ${r.status === 'success' ? `<button onclick='showModal("分析结果",${rawData})' class="text-blue-600 hover:underline">查看</button>` : ''}
          <button onclick="reanalyze(${r.id})" class="text-green-600 hover:underline">重新分析</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function relPath(absPath) {
  const idx = absPath.indexOf('data/images/');
  return idx >= 0 ? absPath.slice(idx + 12) : absPath;
}

async function downloadImages(id) {
  const btn = document.getElementById('btn-download');
  btn.disabled = true; btn.textContent = '下载中...';
  try {
    const r = await fetch(`/api/articles/${id}/download`, {method:'POST'});
    const d = await r.json();
    if (d.ok) showDetail(id);
    else alert('下载失败: ' + (d.error || ''));
  } catch(e) { alert('下载异常: ' + e.message); }
  finally { btn.disabled = false; btn.textContent = '下载图片'; }
}

async function analyzeAll(id) {
  const btn = document.getElementById('btn-analyze');
  btn.disabled = true; btn.textContent = '分析中...';
  try {
    const r = await fetch(`/api/articles/${id}/analyze`, {method:'POST'});
    const d = await r.json();
    alert(`分析完成: ${d.success} 成功, ${d.failed} 失败`);
    showDetail(id);
  } catch(e) { alert('分析异常: ' + e.message); }
  finally { btn.disabled = false; btn.textContent = '分析全部'; }
}

async function reanalyze(recordId) {
  if (!confirm('确定重新分析这张图片？')) return;
  try {
    const r = await fetch(`/api/records/${recordId}/reanalyze`, {method:'POST'});
    const d = await r.json();
    if (d.ok) {
      alert('分析成功！');
      showDetail(currentArticleId);
    } else {
      alert('分析失败: ' + (d.error || ''));
      showDetail(currentArticleId);
    }
  } catch(e) { alert('异常: ' + e.message); }
}

function hideDetail() {
  currentArticleId = null;
  document.getElementById('article-detail').classList.add('hidden');
  refreshArticles();
}

// ── Valuations ──
let allValuations = [];

async function refreshValuations() {
  const r = await fetch('/api/valuations'); const d = await r.json();
  allValuations = d.indexes || [];
  renderValuations(allValuations);
}

function renderValuations(list) {
  document.getElementById('valuation-tbody').innerHTML = list.map(v => `
    <tr class="hover:bg-gray-50">
      <td class="p-2 font-mono">${esc(v.index_code)}</td>
      <td class="p-2">${esc(v.index_name || '?')}</td>
      <td class="p-2">${v.metric_type || '-'}</td>
      <td class="p-2 text-right">${v.current_value ?? '-'}</td>
      <td class="p-2 text-right">${v.percentile != null ? v.percentile + '%' : '-'}</td>
      <td class="p-2">${v.latest_date || '-'}</td>
      <td class="p-2 text-right">${v.record_count || 0}</td>
    </tr>
  `).join('') || '<tr><td colspan="7" class="p-4 text-center text-gray-400">暂无数据</td></tr>';
}

function filterValuations() {
  const q = document.getElementById('val-search').value.trim().toLowerCase();
  if (!q) return renderValuations(allValuations);
  renderValuations(allValuations.filter(v =>
    (v.index_code || '').toLowerCase().includes(q) ||
    (v.index_name || '').toLowerCase().includes(q)
  ));
}

// ── Modal ──
function showModal(title, body) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = typeof body === 'string' ? body : JSON.stringify(body, null, 2);
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modal').classList.add('hidden');
}

function formatValuation(v) {
  return JSON.stringify(v, null, 2);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ── Init ──
refreshArticles();
</script>
</body>
</html>
